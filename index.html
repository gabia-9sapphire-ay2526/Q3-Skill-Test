<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
    
    <!-- BOOTSTRAP-CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="body">

    <div class="container my-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Member Sign-Up</h4>
            </div>
            
            <div class="card-body">
                <h5>STUDENT DETAILS</h5>
                <input type="text" class="form-control mb-3" placeholder="Full Name">

                <h5 class="mt-4">TICKET SELECTION</h5>
                <label for="quantity" class="form-label">Quantity (₱250.00 each)</label>
                <input type="number" class="form-control mb-3" id="quantity" min="0" value="1">

                <div class="mb-3">
                    <label class="form-label">Member ID:</label>
                    <input type="text" class="form-control" placeholder="---" disabled>
                </div>
                
                <hr>
                
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal:</span>
                    <span id="subtotal">₱1000.00</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Admin Fee:</span>
                    <span>₱50.00</span>
                </div>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Total:</span>
                    <span id="total">₱1050.00</span>
                </div>
            </div>
            
            <div class="button-type">
                <button type="button" class="button-type w-100" onclick="registerUser()">Register</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>

</body>
</html>
